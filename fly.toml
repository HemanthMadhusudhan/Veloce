# fly.toml app configuration file for deploying PocketBase to Fly.io

app = "veloce-jersey-backend"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile.pocketbase"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "pb_data"
  destination = "/pb/pb_data"
